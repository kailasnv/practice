<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testing http server</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f4f4;
        }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            text-align: center;
            padding: 20px;
        }

        .hero img {
            width: 400px;
            max-width: 90%;
            border-radius: 10px;
        }

        h1 {
            font-size: 3rem;
            color: #333;
        }

        p {
            font-size: 1.2rem;
            color: #666;
            max-width: 600px;
        }

        .btn {
            padding: 12px 24px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1>Welcome to My Website</h1>

        <p>
            This is a simple landing page created using HTML and CSS.
            You can customize it for your portfolio, business, or project.
        </p>
        <img src="https://picsum.photos/800/400" alt="Landing Page Image">

    </section>

</body>
</html>
